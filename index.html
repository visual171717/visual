<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yatay Çark</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <div class="roulette">
      <div class="pointer"></div>
      <div id="track" class="track"></div>
    </div>

    <div class="controls">
      <button id="spinBtn" onclick="spin()">ÇEVİR</button>
    </div>

    <div id="result" class="result"></div>

    <!-- Sağ altta belirgin Force Red butonu -->
    <button id="forceBtn" onclick="forceRed()">🔥 KIRMIZI</button>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
